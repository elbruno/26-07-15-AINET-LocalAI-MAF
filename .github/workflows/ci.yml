name: CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
  push:
    branches: [dev, preview, main, insider]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore dotnet-local-ai.slnx

      - name: Build
        run: dotnet build dotnet-local-ai.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test dotnet-local-ai.slnx --configuration Release --no-build --verbosity normal
